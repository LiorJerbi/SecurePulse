services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: securepulse
      POSTGRES_PASSWORD: securepulse123
      POSTGRES_DB: securepulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data: